name: live-smoke

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run live ENA/NCBI smoke tests
        env:
          ICHSM_LIVE_TESTS: "1"
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: go test ./... -run '^TestLive' -count=1 -v
